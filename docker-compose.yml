version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexus_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/postgress/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nexus_network

  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexus_network

  backend:
    build:
      context: ../backend
    container_name: nexus_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=nexus_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - nexus_network

  client:
    build:
      context: ../client
    container_name: nexus_client
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - nexus_network

  orchestration:
    build:
      context: ../orchestration
    container_name: nexus_orchestration
    restart: always
    ports:
      - "8001:8001"
    networks:
      - nexus_network

  llms_host:
    build:
      context: ./llms_host
      dockerfile: Dockerfile
    container_name: nexus_llms_host
    restart: always
    ports:
      - "8002:8002"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - nexus_network

  rag_pipeline:
    build:
      context: ./rag_pipline
      dockerfile: Dockerfile
    container_name: nexus_rag_pipeline
    restart: always
    environment:
      - LLMS_HOST_URL=http://llms_host:8002
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
    depends_on:
      - llms_host
      - redis
      - minio
    networks:
      - nexus_network

  minio:
    image: minio/minio
    container_name: nexus_minio
    restart: always
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console UI
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - nexus_network

volumes:
  postgres_data:
  redis_data:
  minio_data:


networks:
  nexus_network:
    driver: bridge
