version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexus_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/postgress/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nexus_network

  adminer:
    image: adminer
    container_name: nexus_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - nexus_network

  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexus_network

  backend:
    build:
      context: ../backend
    container_name: nexus_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=nexus_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - nexus_network

  client:
    build:
      context: ../client
    container_name: nexus_client
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - nexus_network

volumes:
  postgres_data:
  redis_data:


networks:
  nexus_network:
    driver: bridge
